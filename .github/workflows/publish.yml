name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install dependencies
        run: npm ci

      - name: Detect changed packages
        id: changes
        run: |
          echo "eclipse=$(git diff --name-only HEAD~1 HEAD | grep -q '^packages/n8n-nodes-eclipse/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "friendgrid=$(git diff --name-only HEAD~1 HEAD | grep -q '^packages/n8n-nodes-friendgrid/' && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Publish eclipse
        if: steps.changes.outputs.eclipse == 'true'
        working-directory: packages/n8n-nodes-eclipse
        run: |
          npm version patch -m "chore: bump eclipse to %s [skip ci]"
          npm run build
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish friendgrid
        if: steps.changes.outputs.friendgrid == 'true'
        working-directory: packages/n8n-nodes-friendgrid
        run: |
          npm version patch -m "chore: bump friendgrid to %s [skip ci]"
          npm run build